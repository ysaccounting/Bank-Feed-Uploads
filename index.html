<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Feed Uploads</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #EAECF0;
    min-height: 100vh;
    padding: 48px 24px 80px;
    color: #1c1c1e;
  }

  .container { max-width: 780px; margin: 0 auto; }

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
    color: #1c1c1e;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 36px 40px 32px;
    margin-bottom: 16px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .form-full { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    color: #8e8e93;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input[type="text"], input[type="date"], select {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #d1d1d6;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    color: #1c1c1e;
    background: #fff;
    outline: none;
    appearance: auto;
  }
  input[type="text"]:focus, input[type="date"]:focus, select:focus {
    border-color: #4a6fa5;
    box-shadow: 0 0 0 3px rgba(74,111,165,0.12);
  }

  .drop-zone {
    border: 1.5px dashed #c7c7cc;
    border-radius: 10px;
    background: #f9f9fb;
    padding: 26px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    margin-bottom: 6px;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #4a6fa5; background: #f0f4fb; }
  .drop-zone.has-file { border-color: #34a853; background: #f0faf3; }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon { font-size: 20px; margin-bottom: 6px; color: #aeaeb2; }
  .drop-zone.has-file .drop-icon { color: #34a853; }
  .drop-text { font-size: 14px; color: #48484a; margin-bottom: 3px; }
  .drop-text a { color: #4a6fa5; text-decoration: none; }
  .drop-zone.has-file .drop-text { color: #34a853; font-weight: 500; }
  .drop-sub { font-size: 11px; color: #aeaeb2; }

  .actions { display: flex; gap: 12px; margin-top: 20px; align-items: center; }

  button {
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 22px;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    transition: background 0.15s, opacity 0.15s;
  }

  #process-btn {
    flex: 1;
    background: #636366;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  #process-btn:hover:not(:disabled) { background: #48484a; }
  #process-btn:disabled { background: #aeaeb2; cursor: not-allowed; }

  #clear-btn {
    background: #fff;
    color: #1c1c1e;
    border: 1px solid #d1d1d6;
    padding: 10px 22px;
  }
  #clear-btn:hover { background: #f2f2f7; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status {
    display: none;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 14px;
  }
  .status.ok  { background: #e8f8ee; color: #1a7f3c; border: 1px solid #a8ddb8; }
  .status.err { background: #fef0f0; color: #c0392b; border: 1px solid #f5c6c6; }

  #results { display: none; }

  .preview-wrap { overflow-x: auto; border: 1px solid #e5e5ea; border-radius: 8px; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: #f2f2f7; }
  th {
    text-align: left; padding: 9px 14px;
    font-size: 10px; font-weight: 600; color: #8e8e93;
    letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap;
  }
  td { padding: 9px 14px; border-top: 1px solid #e5e5ea; white-space: nowrap; font-size: 13px; }

  .btn-download {
    display: block;
    background: #636366;
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.15s;
    text-align: center;
  }
  .btn-download:hover { background: #48484a; }

  @media (max-width: 500px) {
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <h1>Bank Feed Uploads</h1>

  <div class="card">
    <div class="form-row">
      <div>
        <label for="broker">Broker</label>
        <select id="broker" onchange="brokerChanged(); checkReady();">
          <option value="">Select...</option>
          <option>Y&amp;S</option>
          <option>Grossman</option>
          <option>Sternbuch</option>
          <option>Pollak</option>
          <option>Levine</option>
          <option>Levovitz</option>
          <option>Chase</option>
          <option>Asher</option>
          <option>Katz</option>
          <option>GK</option>
          <option>TL</option>
          <option>Waxler</option>
          <option>Ticket Guy</option>
          <option>YourTickets</option>
          <option value="Other">Other</option>
        </select>
        <input type="text" id="broker-other" placeholder="Enter broker name"
               style="display:none;margin-top:8px;" oninput="checkReady()" />
        <div id="subaccount-wrap" style="display:none;margin-top:8px;">
          <label style="margin-bottom:5px;">Last subaccount # used <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
          <input type="number" id="subaccount-last" min="1" max="14" placeholder="e.g. 8"
                 style="width:100%;padding:9px 12px;border:1px solid #d1d1d6;border-radius:8px;font-family:inherit;font-size:14px;color:#1c1c1e;background:#fff;outline:none;" />
        </div>
      </div>
      <div>
        <label for="platform">Platform</label>
        <select id="platform" onchange="checkReady()">
          <option value="">Select...</option>
        </select>
      </div>
    </div>

    <div class="form-full">
      <label for="account-name">Account Name <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
      <input type="text" id="account-name" placeholder="e.g. WH" />
    </div>

    <div class="form-row">
      <div>
        <label for="date-start">Start date</label>
        <input type="date" id="date-start" onchange="checkReady()" />
      </div>
      <div>
        <label for="date-end">End date</label>
        <input type="date" id="date-end" onchange="checkReady()" />
      </div>
    </div>

    <label>Source file</label>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".csv,.xlsx" />
      <div class="drop-icon" id="drop-icon">↑</div>
      <div class="drop-text" id="drop-text">Drag &amp; drop or <a>browse</a></div>
      <div class="drop-sub" id="drop-sub">CSV or XLSX</div>
    </div>

    <div style="margin-top:16px;">
      <label>Output files</label>
      <div style="display:flex;gap:20px;margin-bottom:10px;">
        <label style="display:flex;align-items:center;gap:6px;font-size:14px;color:#1a1a18;text-transform:none;letter-spacing:0;font-weight:400;cursor:pointer;">
          <input type="radio" name="output_mode" value="single" checked onchange="toggleSplit()" /> Single file
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:14px;color:#1a1a18;text-transform:none;letter-spacing:0;font-weight:400;cursor:pointer;">
          <input type="radio" name="output_mode" value="multi" onchange="toggleSplit()" /> Multiple files
        </label>
      </div>
      <div id="split-options" style="display:none;">
        <label>Rows per file</label>
        <div style="display:flex;gap:20px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:14px;color:#1a1a18;text-transform:none;letter-spacing:0;font-weight:400;cursor:pointer;">
            <input type="radio" name="rows_per_file" value="50" checked /> 50
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:14px;color:#1a1a18;text-transform:none;letter-spacing:0;font-weight:400;cursor:pointer;">
            <input type="radio" name="rows_per_file" value="75" /> 75
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:14px;color:#1a1a18;text-transform:none;letter-spacing:0;font-weight:400;cursor:pointer;">
            <input type="radio" name="rows_per_file" value="100" /> 100
          </label>
        </div>
      </div>
    </div>

    <div class="status" id="status"></div>

    <div class="actions">
      <button id="process-btn" disabled>
        <span id="btn-label">Convert</span>
        <div class="spinner" id="spinner"></div>
      </button>
      <button id="clear-btn">Clear / Reset</button>
    </div>
  </div>

  <div id="results">
    <div class="card">
      <p id="row-count" style="font-size:14px;color:#3b6d11;margin-bottom:16px;font-weight:500;"></p>
      <div class="preview-wrap">
        <table>
          <thead>
            <tr><th>Date</th><th>Description</th><th>Amount</th></tr>
          </thead>
          <tbody id="preview-body"></tbody>
        </table>
      </div>
      <div id="downloads" style="display:flex;flex-direction:column;gap:10px;"></div>
    </div>
  </div>

</div>
<script>
  let selectedFile = null;

  // Load default platforms on page load
  updatePlatforms('');

  function checkReady() {
    const brokerSel = document.getElementById('broker').value;
    const broker    = brokerSel === 'Other'
      ? document.getElementById('broker-other').value.trim()
      : brokerSel.trim();
    const platform = document.getElementById('platform').value;
    const ds       = document.getElementById('date-start').value;
    const de       = document.getElementById('date-end').value;
    document.getElementById('process-btn').disabled = !(broker && platform && ds && de && selectedFile);
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
    el.style.display = 'block';
  }

  // File handling
  const dropZone  = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  function setFile(f) {
    selectedFile = f;
    dropZone.classList.add('has-file');
    document.getElementById('drop-icon').textContent = '✓';
    document.getElementById('drop-text').innerHTML = `<strong>${f.name}</strong>`;
    document.getElementById('drop-sub').textContent = (f.size / 1024).toFixed(1) + ' KB';
    checkReady();
  }

  fileInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });

  function reset() {
    selectedFile = null;
    document.getElementById('broker').value = '';
    document.getElementById('broker-other').value = '';
    document.getElementById('broker-other').style.display = 'none';
    document.getElementById('subaccount-last').value = '';
    document.getElementById('subaccount-wrap').style.display = 'none';
    document.getElementById('platform').value = '';
    document.getElementById('account-name').value = '';
    document.getElementById('date-start').value = '';
    document.getElementById('date-end').value = '';
    dropZone.classList.remove('has-file');
    document.getElementById('drop-icon').textContent = '↑';
    document.getElementById('drop-text').innerHTML = 'Drag &amp; drop or <a>browse</a>';
    document.getElementById('drop-sub').textContent = 'CSV or XLSX';
    fileInput.value = '';
    document.getElementById('status').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    document.getElementById('downloads').innerHTML = '';
    checkReady();
  }

  document.getElementById('clear-btn').addEventListener('click', reset);

  document.getElementById('process-btn').addEventListener('click', async () => {
    if (!selectedFile) return;

    const processBtn = document.getElementById('process-btn');
    processBtn.disabled = true;
    document.getElementById('btn-label').textContent = 'Converting…';
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('status').style.display = 'none';
    document.getElementById('results').style.display = 'none';

    const fd = new FormData();
    const isMulti = document.querySelector('input[name=output_mode]:checked').value === 'multi';
    const rowsPerFile = document.querySelector('input[name=rows_per_file]:checked').value;
    const brokerVal = document.getElementById('broker').value === 'Other'
      ? document.getElementById('broker-other').value.trim()
      : document.getElementById('broker').value.trim();
    fd.append('broker', brokerVal);
    fd.append('platform',      document.getElementById('platform').value);
    fd.append('account_name',  document.getElementById('account-name').value.trim());
    fd.append('date_start',    document.getElementById('date-start').value);
    fd.append('date_end',      document.getElementById('date-end').value);
    const subLast = document.getElementById('subaccount-last').value.trim();
    fd.append('split',          isMulti ? '1' : '0');
    fd.append('subaccount_last', subLast);
    fd.append('rows_per_file', rowsPerFile);
    fd.append('file',          selectedFile);

    try {
      const resp = await fetch('/process', { method: 'POST', body: fd });
      const d = await resp.json();

      if (!resp.ok || d.error) {
        showStatus(d.error || 'Processing failed.', 'err');
      } else {
        showStatus(`${d.row_count.toLocaleString()} transactions exported successfully.`, 'ok');

        // Preview
        document.getElementById('row-count').textContent =
          `${d.row_count.toLocaleString()} transactions — showing first ${Math.min(8, d.row_count)}`;
        const tbody = document.getElementById('preview-body');
        tbody.innerHTML = '';
        d.preview.forEach(r => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${r.Date}</td><td>${r.Description}</td><td>${r.Amount}</td>`;
          tbody.appendChild(tr);
        });
        if (d.row_count > 8) {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td colspan="3" style="color:#888780;font-style:italic;padding:8px 14px;">… and ${(d.row_count - 8).toLocaleString()} more rows</td>`;
          tbody.appendChild(tr);
        }

        // Downloads — always a single button (single CSV or zip)
        const dlWrap = document.getElementById('downloads');
        dlWrap.innerHTML = '';
        const f = d.files[0];
        const a = document.createElement('a');
        a.href = f.url;
        a.download = f.name;
        a.className = 'btn-download';
        a.textContent = 'Download  ' + f.name;
        dlWrap.appendChild(a);
        document.getElementById('results').style.display = 'block';
      }
    } catch (err) {
      showStatus('Network error: ' + err.message, 'err');
    } finally {
      processBtn.disabled = false;
      document.getElementById('btn-label').textContent = 'Convert';
      document.getElementById('spinner').style.display = 'none';
      checkReady();
    }
  });
  const DEFAULT_PLATFORMS = [
    'Divvy CR','Divvy PF','EvoPay','Global Rewards','Slash','Taekus','Wex CR','Wex PF'
  ];
  const YS_PLATFORMS = [
    'Divvy CR','Divvy PF','EvoPay','Global Rewards','Slash','Taekus',
    'Wex CR (280)','Wex CR (285)','Wex PF','Wex PF (285)'
  ];

  function updatePlatforms(broker) {
    const sel = document.getElementById('platform');
    const current = sel.value;
    const platforms = broker === 'Y&S' ? YS_PLATFORMS : DEFAULT_PLATFORMS;
    sel.innerHTML = '<option value="">Select...</option>';
    platforms.forEach(p => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = p;
      if (p === current) opt.selected = true;
      sel.appendChild(opt);
    });
    // If current selection no longer valid, reset
    if (!platforms.includes(current)) sel.value = '';
    checkReady();
  }

  function brokerChanged() {
    const sel = document.getElementById('broker').value;
    const other = document.getElementById('broker-other');
    other.style.display = sel === 'Other' ? 'block' : 'none';
    if (sel !== 'Other') other.value = '';
    const subWrap = document.getElementById('subaccount-wrap');
    subWrap.style.display = sel === 'Y&S' ? 'block' : 'none';
    if (sel !== 'Y&S') document.getElementById('subaccount-last').value = '';
    updatePlatforms(sel);
  }

  function toggleSplit() {
    const multi = document.querySelector('input[name=output_mode]:checked').value === 'multi';
    document.getElementById('split-options').style.display = multi ? 'block' : 'none';
  }
</script>
</body>
</html>
